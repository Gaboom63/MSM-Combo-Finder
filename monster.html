<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="icon" href="ideas/favicon.txt" type="image/png">
    <link rel="icon" type="image/x-icon" href="images/important/mammoticon.png">
    <title>MSM Combo Finder</title>
</head>

<body style="background-image: url(CSS/images/backgrounds/NoEventShellbeat.jpg); background-size: cover;">

    <div id="blurOverlay"></div>
    <div id="blurMessage" onclick="reset()">Press ESC to go back</div>
    <div id="iconContainer">
        <img id="icon" src="images/important/Speedy_deletion.png" alt="Icon" />
        <div id="textContainer">
            <div id="hoverText">This Is Still In Progress <br> Please Share Your Thoughts <br> On The <a
                    href="https://github.com/Fighterhen63/MSM-Combo-Finder">Github</a> Or <a
                    href="https://mysingingmonsters.fandom.com/f/p/4400000000000256505">Fandom!</a></div>
        </div>
    </div>
    <b>
        <h1 id="title">My Singing Monsters <br> Combo Finder</h1>
    </b>
    <div id="inputContainer">
        <button id="openBreedUI" class="main-menu-btn">🎶 Breed Two Monsters</button><br><br>

        <div class="divider">
            <span>OR</span>
        </div><br>

        <input id="Search_Monster" autocomplete="off" placeholder="🔍 Search any monster..." style="color: black;"><br><br>
    </div>

    <div id="breedSplitView">
        <button id="closeBreedUI" title="Close"><i class="fas fa-times"></i></button>
        
        <div class="split-half">
            <h2>Parent 1</h2>
            <div id="placeholder-1" class="empty-slot"><i class="fas fa-egg"></i></div>
            <img id="parent-img-1" class="parent-img" style="display: none;">
            
            <input id="First_Monster" autocomplete="off" placeholder="Choose First Monster...">
            <div id="grid1" class="local-grid"></div> 
        </div>
        
        <div class="split-divider">
            <div class="fusion-badge"><i class="fas fa-plus"></i></div>
        </div>
        
        <div class="split-half">
            <h2>Parent 2</h2>
            <div id="placeholder-2" class="empty-slot"><i class="fas fa-egg"></i></div>
            <img id="parent-img-2" class="parent-img" style="display: none;">

            <input id="Second_Monster" autocomplete="off" placeholder="Choose Second Monster...">
            <div id="grid2" class="local-grid"></div>
        </div>
    </div>

    <div id="dynamicMonsterGrid"></div>

    <div id="resultContainer">

        <div id="leftPanel">
            <div id="tabsContainer" class="tabs-container"></div>

            <div id="utilityButtons">
                <button id="costumeButton">Switch Costume</button>
                <button id="majorMinorButton">Switch</button>
                <button id="common">Common</button>
                <button id="rare">Rare</button>
                <button id="epic">Epic</button>
                <button id="volume-button" title="Play Sound" onclick="playSound()"><i
                        class="fas fa-volume-up"></i></button>
            </div>

            <div id="imageContainer">
                <div id="loadingSpinner" class="spinner"></div>
                <img id="monsterImage" class="monster-image">
            </div>
        </div>

        <div id="statsBox">
            <h3 id="name"></h3>
            <p id="breedingTime"></p>
            <p id="breedingCombo"></p>
        </div>

    </div>

    <img id="noMonsterImage">
    <script src="JS/monster.js"></script>
</body>

</html>
